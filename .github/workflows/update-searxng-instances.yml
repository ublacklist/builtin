name: Update SearXNG Instances

on:
  schedule:
    - cron: "0 15 * * 5"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  update-searxng-instances:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true
          cache: true

      - name: pnpm update-searxng-instances
        run: pnpm update-searxng-instances

      - name: Generate token for pull request
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.PULL_REQUESTS_APP_ID }}
          private-key: ${{ secrets.PULL_REQUESTS_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "searxng: update instances"
          branch: update-searxng-instances
          title: Update SearXNG instances
