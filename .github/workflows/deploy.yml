name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: dist

      - name: Copy files from main
        run: |
          git fetch --depth=1 origin main
          git restore --source=origin/main --no-overlay serpinfo

      - name: Update timestamp
        run: |
          git add -N serpinfo
          timestamp=$(date -u "+%Y-%m-%dT%H:%M:%SZ")
          for file in serpinfo/*.yml; do
            timestamp_line=$(grep -n -m1 "^lastModified: " "$file") || continue
            diff_stat=$(git diff --numstat "$file")
            if [[ $diff_stat =~ ^1[[:space:]]+1[[:space:]]+ ]]; then
              git restore "$file"
            else
              sed -i "${timestamp_line%%:*}s/.*/lastModified: $timestamp/" "$file"
            fi
          done

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit changes
        run: |
          if ! git diff --quiet serpinfo; then
            git config user.name ublacklist-bot[bot]
            git config user.email 266303437+ublacklist-bot[bot]@users.noreply.github.com
            git add serpinfo
            git commit -m "update serpinfo"
            git -c credential.helper='!gh auth git-credential' push
          fi
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
